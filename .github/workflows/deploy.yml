name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Deploy
        run: echo "Add deployment steps here (e.g., upload dist/ to your hosting provider)"
        # Replace this step with your actual deployment commands, for example:
        # - AWS S3 sync: aws s3 sync dist/ s3://your-bucket
        # - Heroku: git push heroku main
        # - Vercel: npx vercel --prod
